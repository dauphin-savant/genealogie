    <!-- 3. Le code pour générer la carte -->
    <script>
        // Initialisation
        var map = L.map('map').setView([46.5, 2.5], 6);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

		// 1. Création de l'objet de contrôle
		var legend = L.control({ position: 'bottomright' }); // Position : 'topright', 'bottomright', etc.

		legend.onAdd = function (map) {
			// Création d'une div avec la classe CSS définie plus haut
			var div = L.DomUtil.create('div', 'info-legend');
			
			// Contenu de votre libellé (HTML autorisé)
			div.innerHTML = `
				<h4>Propriétés</h4>
				<b>Généalogie :</b> Famille Durand<br>
				<b>Période :</b> 1750 - 1920<br>
				<small>Cliquer sur un groupe pour voir les détails.</small>
			`;
			
			return div;
		};
		legend.addTo(map);


        // Création du groupe de clusters
        var clusters = L.markerClusterGroup();

        // Utilisation de la variable 'mesAncetres' définie dans donnees.js
        mesAncetres.forEach(function(ancetre) {
            var marker = L.marker(ancetre.coords)
                .bindPopup(`
                    <strong>${ancetre.nom}</strong><br>
                    ${ancetre.date}<br>
                    <em>${ancetre.lieu}</em><br>
                    <hr>
                    ${ancetre.details}
                `);
            
            clusters.addLayer(marker);
        });
        map.addLayer(clusters);
		
		
		
    </script>
</body>
