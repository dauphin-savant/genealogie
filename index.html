    <!-- 3. Le code pour générer la carte -->
    <script>
        // Initialisation
        var map = L.map('map').setView([46.5, 2.5], 6);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // Création du groupe de clusters
        var clusters = L.markerClusterGroup();

        // Utilisation de la variable 'mesAncetres' définie dans donnees.js
        mesAncetres.forEach(function(ancetre) {
            var marker = L.marker(ancetre.coords)
                .bindPopup(`
                    <strong>${ancetre.nom}</strong><br>
                    ${ancetre.date}<br>
                    <em>${ancetre.lieu}</em><br>
                    <hr>
                    ${ancetre.details}
                `);
            
            clusters.addLayer(marker);
        });

        // Ajouter tout le groupe à la carte
        map.addLayer(clusters);
    </script>
